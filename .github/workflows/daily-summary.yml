name: Daily market summary to Telegram

on:
  schedule:
    # GitHub Actions работает по UTC. 05:00 UTC = 08:00 Киев (лето) / 07:00 (зима).
    # Один запуск в день; скрипт отправляет безусловно (устойчиво к задержкам GitHub).
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Отправить сейчас, игнорируя проверку времени (для теста)"
        type: boolean
        default: true

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Какой cron запустил задачу (для выбора лето/зима в скрипте)
          SCHEDULED_CRON: ${{ github.event.schedule }}
          # При ручном запуске с force=true пропускаем проверку времени
          ENFORCE_SEND_HOUR: ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '0' || '1' }}
        run: python send_summary.py
